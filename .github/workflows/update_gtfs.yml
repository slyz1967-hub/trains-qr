name: Update GTFS Routes

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2am
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download latest GTFS
        run: |
          curl -L -o SEQ_GTFS.zip "https://www.data.qld.gov.au/dataset/general-transit-feed-specification-gtfs-seq/resource/be7de52a-7e84-4f76-aedb-2b5762d8a506/download/seq_gtfs.zip"
          mkdir -p gtfs
          unzip -o SEQ_GTFS.zip -d gtfs
          ls -la gfts/

      - name: Run route builder
        run: python3 scripts/build_routes.py --gtfs ./gtfs --out ./route_db.json

      - name: Inject routes into index.html
        run: python3 scripts/inject_routes.py --routes ./route_db.json --html ./index.html

      - name: Commit and push if changed
        run: |
          git config user.name "GTFS Bot"
          git config user.email "gtfs-bot@users.noreply.github.com"
          git add index.html route_db.json
          git diff --staged --quiet || git commit -m "Auto-update routes from GTFS $(date +%Y-%m-%d)"
          git push
