name: Update GTFS Routes

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2am
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject routes into index.html
        run: python3 scripts/inject_routes.py --routes ./route_db.json --html ./index.html. || true

      - name: Commit and push if changed
        run: |
          git config user.name "GTFS Bot"
          git config user.email "gtfs-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update routes from route_db.json $(date +%Y-%m-%d)"
          git push
